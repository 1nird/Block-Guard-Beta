<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blocked</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&amp;family=Manrope:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Manrope', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f7f5f2;
      color: #1a1c1c;
    }
    .blocked-page {
      width: 440px;
      background: #fff;
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 4px 32px rgba(0,0,0,0.06);
    }
    .blocked-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: #fce8e7;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .blocked-icon span { color: #c0524e; font-size: 32px; }
    .blocked-page h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 24px; font-weight: 800;
      margin-bottom: 8px; color: #1a1c1c;
    }
    .blocked-page p { font-size: 14px; color: #6b7370; margin-bottom: 4px; }
    .blocked-site { font-weight: 600; color: #45645e; margin-bottom: 24px; }
    .blocked-stats {
      background: #f0f4f3; border-radius: 16px;
      padding: 20px; margin-bottom: 24px;
    }
    .blocked-stats .stat-number {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 32px; font-weight: 800; color: #45645e;
    }
    .blocked-stats .stat-label {
      font-size: 11px; font-weight: 600; color: #6b7370;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .close-btn {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700; font-size: 13px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #45645e, #84a59d);
      color: #fff; border: none; border-radius: 14px;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.3s;
      box-shadow: 0 4px 16px rgba(69,100,94,0.2);
      letter-spacing: 0.3px;
    }
    .close-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 6px 24px rgba(69,100,94,0.3);
    }
    /* Prevent showing the previous blocked page via back-forward cache */
  </style>
</head>
<body>
  <div class="blocked-page">
    <div class="blocked-icon">
      <span class="material-symbols-outlined">block</span>
    </div>
    <h1>Focus mode is on</h1>
    <p>This site is blocked to help you stay focused.</p>
    <p id="blocked-site-url" class="blocked-site"></p>
    <div class="blocked-stats">
      <div id="blocked-count" class="stat-number">0</div>
      <div class="stat-label">Distractions avoided</div>
    </div>
    <button id="close-tab-btn" class="close-btn">Stay focused</button>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
